# FHEM-MCP-Server als Portainer-Stack.
#
# Wichtig fürs Sicherheitsmodell:
#   * Dieser Container ist der EINZIGE, der vom Reverse Proxy (TLS) aus dem
#     Internet erreichbar gemacht wird – niemals FHEMWEB direkt.
#   * Der Container erreicht FHEMWEB nur über das interne Docker-Netz.
#     FHEMWEB sollte eine eigene, abgeschottete Instanz sein (basicAuth,
#     allowedCommands auf 'mcp' beschränkt).
#
# Variablen über Portainer-Stack-Env oder eine .env-Datei setzen
# (siehe .env.example).

services:
  fhem-mcp:
    build:
      context: ./server
    image: fhem-mcp:latest
    # Image wird lokal gebaut (liegt in keiner Registry) -> Compose soll es
    # bauen statt zu pullen. Verhindert "pull access denied" beim Redeploy.
    # In Portainer beim Update zusaetzlich "Re-pull image" NICHT anhaken.
    pull_policy: build
    # Kein fester container_name: sonst kollidiert ein zweiter Stack (z. B. für
    # eine weitere FHEM-Instanz) mit demselben Namen. Ohne diese Zeile vergibt
    # Compose pro Stack einen eindeutigen Namen (<stackname>-fhem-mcp-1).
    # Bei Bedarf gezielt setzen: container_name: ${FHEMMCP_NAME:-}
    restart: unless-stopped
    environment:
      FHEMMCP_FHEM_URL: ${FHEMMCP_FHEM_URL:-http://fhem:8083/fhem}
      FHEMMCP_FHEM_USER: ${FHEMMCP_FHEM_USER:-}
      FHEMMCP_FHEM_PASSWORD: ${FHEMMCP_FHEM_PASSWORD:-}
      FHEMMCP_FHEM_VERIFY_TLS: ${FHEMMCP_FHEM_VERIFY_TLS:-true}
      FHEMMCP_HOST: 0.0.0.0
      FHEMMCP_PORT: 8000
      FHEMMCP_MCP_PATH: ${FHEMMCP_MCP_PATH:-/mcp}
      FHEMMCP_OAUTH_ENABLED: ${FHEMMCP_OAUTH_ENABLED:-true}
      FHEMMCP_PUBLIC_URL: ${FHEMMCP_PUBLIC_URL:-}
    # Port-Veröffentlichung:
    #   Fall A – Reverse Proxy auf dem HOST (z. B. Synology-eigener Proxy):
    #     Port an localhost binden, der Proxy zeigt dann auf http://localhost:8000.
    #     127.0.0.1 haelt den Dienst vom LAN fern (nur der Host-Proxy kommt ran).
    #     Falls der Proxy localhost nicht erreicht, "8000:8000" verwenden.
    #   Host-Port ueber FHEMMCP_HOSTPORT konfigurierbar (Default 8000), falls 8000
    #   auf der NAS schon belegt ist. Der Reverse Proxy zeigt dann auf diesen Port.
    ports:
      - "127.0.0.1:${FHEMMCP_HOSTPORT:-8000}:8000"
    #   Fall B – Reverse Proxy als CONTAINER im selben Docker-Netz:
    #     statt 'ports' nur 'expose: ["8000"]' und gemeinsames Netz nutzen;
    #     der Proxy zeigt dann auf http://fhem-mcp:8000.
    security_opt:
      - no-new-privileges:true
    read_only: true
